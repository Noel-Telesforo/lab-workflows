name: CONTINUOUS INTEGRATION

on:
  # Se ejecuta en cada push a las ramas develop, staging y main
  pull_request:
    branches:
      - develop
      - staging
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      # Instalar Java 17 y configurar el entorno
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Verificar versión Java
        run: java-version
      # Ejecutar Maven para compilar y empaquetar la aplicación
      - name: Build con Maven
        run: mvn clean package
      # Guarda el .war generado como artifact para su posterior uso
      - name: Subir artifact (.war)
        uses: actions/upload-artifact@v4
        with:
          name: app-war
          path: target/*.war